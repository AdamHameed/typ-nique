services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    env_file:
      - ../../.env
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ../..:/app
      - /app/node_modules

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/typ_nique
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/typ_nique
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ../..:/app
      - /app/node_modules

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/typ_nique
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/typ_nique
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    mem_limit: 768m
    pids_limit: 128
    tmpfs:
      - /tmp:size=128m
    volumes:
      - ../..:/app
      - /app/node_modules

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: typ_nique
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
