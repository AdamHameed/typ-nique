name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"
  NEXT_PUBLIC_API_URL: http://localhost:4000
  API_INTERNAL_URL: http://127.0.0.1:4000
  WORKER_RENDER_URL: http://127.0.0.1:4100
  WORKER_INTERNAL_TOKEN: ci-worker-token
  RENDER_ADMIN_TOKEN: ci-render-admin-token
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/typ_nique_ci
  DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/typ_nique_ci
  REDIS_URL: redis://localhost:6379
  API_PORT: 4000
  WEB_PORT: 3000
  WORKER_PORT: 4100
  QUEUE_NAME: render-jobs
  AUTH_COOKIE_NAME: typ_nique_auth
  GUEST_COOKIE_NAME: typ_nique_guest
  AUTH_SESSION_TTL_DAYS: 30
  PREVIEW_RATE_LIMIT_WINDOW_MS: 60000
  PREVIEW_RATE_LIMIT_MAX: 45
  SUBMISSION_RATE_LIMIT_WINDOW_MS: 60000
  SUBMISSION_RATE_LIMIT_MAX: 90
  TYPST_BIN: typst
  TYPST_TIMEOUT_MS: 4000
  TYPST_MAX_MEMORY_KB: 524288
  TYPST_MAX_CONCURRENT_RENDERS: 2
  TYPST_MAX_SOURCE_BYTES: 12000
  TYPST_MAX_OUTPUT_BYTES: 262144
  TYPST_MAX_LOG_BYTES: 16384
  TYPST_TEMP_ROOT_DIR: /tmp
  TYPST_WORKSPACE_MAX_AGE_MS: 900000
  RENDER_CACHE_TTL_MS: 300000
  RENDER_FAILURE_CACHE_TTL_MS: 30000
  RENDER_CACHE_MAX_ENTRIES: 500
  ARTIFACTS_DIR: /tmp/typ-nique-artifacts

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    name: Dependency Audit and Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run production dependency audit
        run: pnpm ci:security

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          scanners: vuln,misconfig

  verify:
    name: Lint, Typecheck, and Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json', 'apps/**/package.json', 'packages/**/package.json', 'tsconfig.base.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm ci:prepare

      - name: Run lint
        run: pnpm ci:lint

      - name: Run typecheck
        run: pnpm ci:typecheck

      - name: Run unit tests
        run: pnpm ci:test:unit

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json', 'apps/**/package.json', 'packages/**/package.json', 'tsconfig.base.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm ci:prepare

      - name: Run build verification
        run: pnpm ci:build

  integration:
    name: Integration Tests
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: typ_nique_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d typ_nique_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm ci:prepare

      - name: Run integration tests
        run: pnpm ci:test:integration

  docker-build:
    name: Docker Build Verification
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: false
          tags: typ-nique-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: false
          tags: typ-nique-web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/worker.Dockerfile
          push: false
          tags: typ-nique-worker:ci
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
