name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"
  NEXT_PUBLIC_API_URL: http://localhost:4000
  API_INTERNAL_URL: http://127.0.0.1:4000
  WORKER_RENDER_URL: http://127.0.0.1:4100
  WORKER_INTERNAL_TOKEN: ci-worker-token
  RENDER_ADMIN_TOKEN: ci-render-admin-token
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/typ_nique_ci
  DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/typ_nique_ci
  REDIS_URL: redis://localhost:6379
  API_PORT: 4000
  WEB_PORT: 3000
  WORKER_PORT: 4100
  QUEUE_NAME: render-jobs
  AUTH_COOKIE_NAME: typ_nique_auth
  GUEST_COOKIE_NAME: typ_nique_guest
  AUTH_SESSION_TTL_DAYS: 30
  PREVIEW_RATE_LIMIT_WINDOW_MS: 60000
  PREVIEW_RATE_LIMIT_MAX: 45
  SUBMISSION_RATE_LIMIT_WINDOW_MS: 60000
  SUBMISSION_RATE_LIMIT_MAX: 90
  TYPST_BIN: typst
  TYPST_TIMEOUT_MS: 4000
  TYPST_MAX_MEMORY_KB: 524288
  TYPST_MAX_CONCURRENT_RENDERS: 2
  TYPST_MAX_SOURCE_BYTES: 12000
  TYPST_MAX_OUTPUT_BYTES: 262144
  TYPST_MAX_LOG_BYTES: 16384
  TYPST_TEMP_ROOT_DIR: /tmp
  TYPST_WORKSPACE_MAX_AGE_MS: 900000
  RENDER_CACHE_TTL_MS: 300000
  RENDER_FAILURE_CACHE_TTL_MS: 30000
  RENDER_CACHE_MAX_ENTRIES: 500
  ARTIFACTS_DIR: /tmp/typ-nique-artifacts

jobs:
  verify:
    name: Lint, Typecheck, and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json', 'apps/**/package.json', 'packages/**/package.json', 'tsconfig.base.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm ci:lint

      - name: Run typecheck
        run: pnpm ci:typecheck

      - name: Run unit tests
        run: pnpm ci:test:unit
