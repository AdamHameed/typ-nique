# Development-only compose stack.
# This file intentionally keeps bind mounts, env_file usage, and local bootstrap helpers
# for day-to-day development. Do not use it as a production deployment template.

name: ${COMPOSE_PROJECT_NAME:-typnique}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: typ_nique
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d typ_nique"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  setup:
    build:
      context: ../..
      dockerfile: infra/docker/api.dev.Dockerfile
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/typ_nique
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/typ_nique
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >-
      sh -lc
      "pnpm --filter @typ-nique/db run generate
      && pnpm --filter @typ-nique/db run deploy
      && pnpm --filter @typ-nique/db run seed"
    restart: "no"
    volumes:
      - ../..:/app
      - api_node_modules:/app/node_modules
      - api_app_node_modules:/app/apps/api/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
      - worker_app_node_modules:/app/apps/worker/node_modules
      - prisma_node_modules:/app/prisma/node_modules
      - type: volume
        source: pnpm_store
        target: /pnpm
        volume:
          nocopy: true

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.dev.Dockerfile
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/typ_nique
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/typ_nique
      REDIS_URL: redis://redis:6379
      WORKER_RENDER_URL: http://worker:4100
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    volumes:
      - ../..:/app
      - api_node_modules:/app/node_modules
      - api_app_node_modules:/app/apps/api/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
      - worker_app_node_modules:/app/apps/worker/node_modules
      - prisma_node_modules:/app/prisma/node_modules
      - type: volume
        source: pnpm_store
        target: /pnpm
        volume:
          nocopy: true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.dev.Dockerfile
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/typ_nique
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/typ_nique
      REDIS_URL: redis://redis:6379
    ports:
      - "4100:4100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    mem_limit: 768m
    cpus: 1.0
    pids_limit: 128
    tmpfs:
      - /tmp:size=128m
    volumes:
      - ../..:/app
      - worker_node_modules:/app/node_modules
      - api_app_node_modules:/app/apps/api/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
      - worker_app_node_modules:/app/apps/worker/node_modules
      - prisma_node_modules:/app/prisma/node_modules
      - type: volume
        source: pnpm_store
        target: /pnpm
        volume:
          nocopy: true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4100/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.dev.Dockerfile
    env_file:
      - ../../.env
    environment:
      API_INTERNAL_URL: http://api:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ../..:/app
      - web_node_modules:/app/node_modules
      - api_app_node_modules:/app/apps/api/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
      - worker_app_node_modules:/app/apps/worker/node_modules
      - prisma_node_modules:/app/prisma/node_modules
      - type: volume
        source: pnpm_store
        target: /pnpm
        volume:
          nocopy: true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  pnpm_store:
  api_node_modules:
  worker_node_modules:
  web_node_modules:
  api_app_node_modules:
  web_app_node_modules:
  worker_app_node_modules:
  prisma_node_modules:
